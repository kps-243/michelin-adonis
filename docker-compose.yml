services:
  app:
    build:
      context: .
      target: dev
    container_name: michelin_app
    ports:
      - "3333:3333"
      - "24678:24678"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
    env_file:
      - .env

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  adminer:
    image: adminer:latest
    container_name: michelin_adminer
    restart: always
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres

volumes:
  postgres_data: